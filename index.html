<style>

.btn:active{transform:scale(.97)}
.btn:focus-visible,.nav-link:focus-visible,.opt:focus-visible,input:focus-visible{outline:3px solid rgba(62,142,99,.5);outline-offset:2px}

.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(16px);background:var(--ink);color:#fff;padding:15px 26px;border-radius:999px;font-size:15px;font-weight:500;box-shadow:0 16px 40px rgba(0,0,0,.24);opacity:0;transition:opacity .3s ease,transform .3s ease;z-index:200;max-width:min(90vw,440px);text-align:center;pointer-events:none}

.room-hint{font-size:12.5px;color:var(--gray);margin-bottom:14px;line-height:1.5}

<script>
/* ═══════════════════════════════════════════════════════
   ROOMSY CONFIG — the only lines you edit to go live.

   WAITLIST_ENDPOINT: make a free form at https://formspree.io
   and paste its endpoint below (looks like
   'https://formspree.io/f/xxxxxxx'). Both waitlist signups
   AND pre-quiz leads (name, email, phone) will email you.
   While empty, everything saves in the visitor's browser
   only (demo mode).
   ═══════════════════════════════════════════════════════ */
const WAITLIST_ENDPOINT = 'https://formspree.io/f/mlgyajrp';

/* ── Supabase (accounts, profiles, photos) ────────────── */
const SUPABASE_URL = 'https://onsrefuxmxmauvxmtdmz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_QHyBDY-lzeGwrgTJs7pGyw_A4FArk_D';
const db = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
let session = null, myProfile = null;
/* Captured synchronously, before supabase-js's own hash cleanup can beat us to it. */
const authHashParams = (function(){
  const h = window.location.hash;
  if(!h || (!h.includes('access_token=') && !h.includes('type='))) return null;
  return new URLSearchParams(h.replace(/^#/, ''));
})();
function showToast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 350); }, 4000);
}
function handleAuthRedirect(){
  if(!authHashParams) return;
  if(window.location.hash) history.replaceState(null, '', window.location.pathname + window.location.search);
  if(!session) return;
  const type = authHashParams.get('type');
  const msg = type === 'signup' ? 'Email confirmed — welcome to Roomsy! 🎉'
    : type === 'recovery' ? 'You’re signed in — set a new password anytime in your profile.'
    : 'Signed in — welcome to Roomsy! 🎉';
  showToast(msg);
  go('profile');
}
/* Pull-based: userType/location are re-derived from the DB on demand wherever they
   gate UI (see loadMyTypeAndLocation below), rather than pushed once at auth-init.
   That push-based approach raced page navigation and localStorage can be unreliable
   (Safari ITP may partition/deny it on this domain), so the DB stays source of truth. */
if(db){
  db.auth.getSession().then(({data}) => { session = data.session; updateAuthNav(); handleAuthRedirect(); });
  db.auth.onAuthStateChange((_e, s2) => { session = s2; updateAuthNav(); });
}
function updateAuthNav(){
  const b = document.getElementById('nav-auth');
  if(b) b.textContent = session ? 'My profile' : 'Sign in';
}

/* ── Data ─────────────────────────────────────────────── */
const TYPES = {
  earlybird:{key:'earlybird',name:'The Early Bird',emoji:'🌅',color:'#E8A13A',blurb:'Up with the sun, coffee brewed by 7. You keep the household on schedule and love a quiet morning.'},
  nightowl:{key:'nightowl',name:'The Night Owl',emoji:'🦉',color:'#4A5A8F',blurb:'You come alive after dark. Late-night snacks, headphones on, deep respect for anyone who sleeps early.'},
  host:{key:'host',name:'The Social Host',emoji:'🎉',color:'#E8705A',blurb:'Your place is the gathering spot. Group dinners, movie nights, always room for one more friend.'},
  homebody:{key:'homebody',name:'The Quiet Homebody',emoji:'🌿',color:'#5A8F6F',blurb:'Home is your recharge zone. Cozy, calm, considerate — the roommate everyone hopes for.'},
  keeper:{key:'keeper',name:'The Order Keeper',emoji:'✨',color:'#3A8F8A',blurb:'Labeled shelves, a chore chart that actually works, and dishes never sleep in the sink.'},
  spirit:{key:'spirit',name:'The Free Spirit',emoji:'🪁',color:'#B45AA0',blurb:'Flexible, easygoing, spontaneous. Plans change, vibes stay good. You adapt to almost any household.'}
};
const QUIZ = [
  {q:'Your alarm goes off at 6:30am. You…',a:[['Already up — beat it by ten minutes','earlybird'],['Snooze once, then go','keeper'],['Snooze until the last possible second','nightowl'],['Alarm? I wake up when I wake up','spirit']]},
  {q:"It's Friday night. Your ideal evening at home:",a:[['Friends over, music on, cooking together','host'],['Blanket, tea, and a show','homebody'],['Deep-cleaning the kitchen, honestly','keeper'],['Gaming or a project until 3am','nightowl']]},

function haversineMiles(lat1,lng1,lat2,lng2){
  const toRad=d=>d*Math.PI/180, R=3958.8;
  const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
async function geocodeArea(q){
  const url=`https://nominatim.openstreetmap.org/search?format=json&limit=1&addressdetails=1&countrycodes=us&q=${encodeURIComponent(q)}`;
  const res=await fetch(url);
  if(!res.ok)throw new Error('geocode request failed');
  const data=await res.json();
  return data.length?data[0]:null;
}
function shortLocationName(result){
  const a=result.address||{};
  const city=a.city||a.town||a.village||a.hamlet||a.county||'';
  const state=a.state?(US_STATES[a.state]||a.state):'';
  return [city,state].filter(Boolean).join(', ')||result.display_name;
}

/* Pull-based fix: whatever UI gates on userType calls this instead of trusting a
   cached/pushed value. Always hits the DB (never assumes localStorage is present or
   correct), and only marks the attempt "done" once so repeat renders (e.g. clicking
   a filter chip) don't refetch forever if the profile genuinely has no type yet. */
async function loadMyTypeAndLocation(){
  if(!db || !session) return false;
  try{
    const {data, error} = await db.from('profiles').select('type,lat,lng,radius_miles').eq('id', session.user.id).maybeSingle();
    if(error){ console.error('Roomsy: failed to load profile type/location', error); return false; }
    if(data){
      myProfile = {...(myProfile||{}), ...data};
      if(data.type && TYPES[data.type] && !userType){
        userType = data.type;
        try{ localStorage.setItem('roomsy_type', userType); }catch(e){}
        return true;
      }
    }
    return false;
  }catch(ex){
    console.error('Roomsy: failed to load profile type/location', ex);
    return false;
  }
}

        ${pill(p.type)}
        <p class="bio">${esc(p.bio)}</p>
        ${p.room_photos&&p.room_photos.length?`<div class="room-strip">${p.room_photos.slice(0,3).map(u=>`<img src="${u}" alt=""/>`).join('')}${p.room_photos.length>3?`<div class="more">+${p.room_photos.length-3}</div>`:''}</div>`:''}
        <div class="tag-row">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <div class="compat${p.score==null?' locked':''}">
          ${p.score!=null?`<span class="pct">${p.score}%</span><span class="label">lifestyle match</span>`:`<span class="pct">Take the quiz to see your match</span>`}
          <button class="btn btn-sm" style="margin-left:auto;background:#fff;color:var(--ink)" data-open="${p.id}">View</button>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
  view.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{filter=b.dataset.filter;renderBrowse()});
  view.querySelectorAll('[data-radius-toggle]').forEach(b=>b.onclick=()=>{radiusOnly=!radiusOnly;renderBrowse()});
  view.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>openModal(b.dataset.open));
  const bx=document.getElementById('loc-banner-x'); if(bx)bx.onclick=()=>{locBannerDismissed=true;renderBrowse()};
}

function openModal(id){
  const p=[...realProfiles,...PROFILES].find(x=>String(x.id)===String(id));
  const score=compat(userType,p.type);
  const back=document.createElement('div');
  back.className='modal-back';
  back.innerHTML=`
  <div class="modal">
    <button class="close" aria-label="Close">✕</button>
    <div class="card-top" style="margin-bottom:16px">${avatar(p,true)}<div><h2>${p.name}, ${p.age}</h2><div class="meta">${p.area} · ${p.budget} · Moves ${p.move}</div></div></div>
    ${pill(p.type)}
    <p style="color:var(--gray);margin:14px 0 16px;line-height:1.5">${esc(p.bio)}</p>
    <div class="tag-row">${p.tags.map(t=>`<span class="tag" style="background:var(--bg-soft)">${t}</span>`).join('')}</div>
    ${p.room_photos&&p.room_photos.length?`<div class="room-gallery">${p.room_photos.map((u,i)=>`<img src="${u}" alt="Room photo ${i+1}"/>`).join('')}</div>`:''}
    ${score!=null?`<div style="display:flex;justify-content:center;margin:20px 0 4px">${ring(score,116)}</div>`:''}
    <div class="demo-banner">Demo profile. Matching and secure messaging arrive with the app — <button data-go="waitlist">join the waitlist</button>.</div>
  </div>`;
  back.onclick=e=>{if(e.target===back)back.remove()};
  back.querySelector('.close').onclick=()=>back.remove();
  back.querySelector('[data-go]').onclick=()=>{back.remove();go('waitlist')};
  document.body.appendChild(back);
  animateRings();
}

    ['Mutual match required',"Nobody can message you unless you've both said yes. No cold DMs, ever."],
    ['Addresses stay private','Only neighborhoods are shown — exact locations are never shared automatically.'],
    ['Report and block anywhere','One tap from any profile or conversation. Reports reviewed within 24 hours.']

  view.innerHTML=`
  <div class="quiz-shell" style="padding-bottom:70px">

    <p style="color:var(--gray);text-align:center;margin-bottom:36px">What ships with the app:</p>
    ${rows.map(([h,p])=>`<div class="safety-row"><h3>${h}</h3><p>${p}</p></div>`).join('')}
    <p style="color:var(--gray);font-size:13.5px;margin-top:26px;text-align:center;line-height:1.55">Wherever you meet a potential roommate: meet in public first, video call before viewings, and never send money before signing a lease you've read.</p>

/* ── Waitlist ─────────────────────────────────────────── */
function bindWaitlist(){
  const btn=document.getElementById('wl-btn');
  const input=document.getElementById('wl-email');
  if(!btn)return;
  const submit=async()=>{
    const email=input.value.trim();
    if(!/.+@.+\..+/.test(email)){input.style.borderColor='#D93838';return}
    btn.textContent='Joining…';btn.disabled=true;
    try{
      if(WAITLIST_ENDPOINT){
        await fetch(WAITLIST_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({email,source:'roomsy-web'})});
      }else{
        const l=JSON.parse(localStorage.getItem('roomsy_waitlist')||'[]');
        l.push({email,at:new Date().toISOString()});
        localStorage.setItem('roomsy_waitlist',JSON.stringify(l));
      }
    }catch(e){}
    document.getElementById('wl-form').outerHTML='<div class="success">You\u2019re on the list. See you at launch. 🎉</div>';
  };
  btn.onclick=submit;
  input.onkeydown=e=>{if(e.key==='Enter')submit()};
  input.oninput=()=>{input.style.borderColor=''};
}

/* ── Auth modal ───────────────────────────────────────── */
function showAuthModal(mode){
  mode = mode || 'signin';
  const back=document.createElement('div');
  back.className='modal-back';
  const render=()=>{
    back.innerHTML=`
    <div class="modal" style="text-align:center">
      <button class="close" aria-label="Close">✕</button>
      <div style="font-size:36px;margin-bottom:6px">🏠</div>
      <h2 style="margin-bottom:4px">${mode==='signin'?'Welcome back':'Create your profile'}</h2>
      <p style="color:var(--gray);font-size:14.5px;margin-bottom:18px">${mode==='signin'?'Sign in to your Roomsy account.':'Join Roomsy — free while we grow.'}</p>
      ${mode==='signup'?'<div class="lead-field"><label>Name</label><input id="au-name" autocomplete="name" placeholder="Your name"/></div>':''}
      <div class="lead-field"><label>Email</label><input id="au-email" type="email" autocomplete="email" placeholder="you@email.com"/></div>
      <div class="lead-field"><label>Password</label><input id="au-pass" type="password" autocomplete="${mode==='signin'?'current-password':'new-password'}" placeholder="${mode==='signin'?'Your password':'6+ characters'}"/></div>
      <div id="au-err" style="color:#D93838;font-size:13px;min-height:18px;margin-bottom:4px"></div>
      <button class="btn btn-primary btn-lg" id="au-go" style="width:100%">${mode==='signin'?'Sign in':'Sign up'}</button>
      <p style="font-size:13.5px;color:var(--gray);margin-top:14px">${mode==='signin'?'New here?':'Already have an account?'}
        <button id="au-switch" style="background:none;border:none;color:var(--accent);font-weight:600;font-size:13.5px;text-decoration:underline">${mode==='signin'?'Create an account':'Sign in'}</button>
      </p>
    </div>`;
    back.querySelector('.close').onclick=()=>back.remove();
    back.querySelector('#au-switch').onclick=()=>{mode=mode==='signin'?'signup':'signin';render()};
    back.querySelector('#au-go').onclick=async()=>{
      const email=back.querySelector('#au-email').value.trim();
      const pass=back.querySelector('#au-pass').value;
      const err=back.querySelector('#au-err');
      const btn=back.querySelector('#au-go');
      if(!/.+@.+\..+/.test(email)){err.textContent='Enter a valid email.';return}
      if(pass.length<6){err.textContent='Password needs 6+ characters.';return}
      btn.disabled=true;btn.textContent='One sec…';
      try{
        if(mode==='signup'){
          const name=(back.querySelector('#au-name')||{}).value?.trim()||'';
          const {data,error}=await db.auth.signUp({email,password:pass});
          if(error)throw error;
          session=data.session;
          if(session){
            await db.from('profiles').upsert({id:session.user.id,name,type:userType||null});
          }
          if(!session){err.style.color='var(--accent)';err.textContent='Check your email to confirm, then sign in.';btn.disabled=false;btn.textContent='Sign up';return}
        }else{
          const {data,error}=await db.auth.signInWithPassword({email,password:pass});
          if(error)throw error;
          session=data.session;
        }
        updateAuthNav();back.remove();go('profile');
      }catch(ex){
        err.textContent=(ex&&ex.message)||'Something went wrong — try again.';
        btn.disabled=false;btn.textContent=mode==='signin'?'Sign in':'Sign up';
      }
    };
  };
  render();
  back.onclick=e=>{if(e.target===back)back.remove()};
  document.body.appendChild(back);
}

/* ── Profile page ─────────────────────────────────────── */
async function renderProfile(){
  if(!db){view.innerHTML='<div class="wrap"><div class="quiz-shell"><p style="text-align:center;color:var(--gray)">Profiles are loading soon.</p></div></div>';return}
  if(!session){showAuthModal('signup');renderHome();page='home';updateNav();return}
  view.innerHTML='<div class="wrap"><div class="quiz-shell"><p style="text-align:center;color:var(--gray)">Loading your profile…</p></div></div>';
  let p={};
  try{
    const {data,error}=await db.from('profiles').select('*').eq('id',session.user.id).maybeSingle();
    if(error) console.error('Roomsy: failed to load profile', error);
    p=data||{};
  }catch(e){ console.error('Roomsy: failed to load profile', e); }
  myProfile=p;
  myTypeFetchAttempted=true;
  /* Pull-based: this fetch already has the freshest type — backfill userType from it
     so Browse (and anything else gating on userType) doesn't need its own round trip. */
  if(p.type && TYPES[p.type] && !userType){
    userType=p.type;
    try{ localStorage.setItem('roomsy_type', userType); }catch(e){}
  }
  let pendingLat=p.lat??null, pendingLng=p.lng??null;
  let pendingRoomPhotos=p.room_photos||[];
  const t=p.type&&TYPES[p.type]?TYPES[p.type]:null;
  const radiusOpts=[5,10,25,50,100];
  view.innerHTML=`
  <div class="wrap"><div class="quiz-shell" style="padding-top:36px">
    <h1 style="font-size:clamp(28px,7vw,40px);letter-spacing:-.028em;text-align:center;margin-bottom:6px">My profile</h1>
    <p style="text-align:center;color:var(--gray);font-size:14.5px;margin-bottom:22px">This is what other members will see.</p>
    <div class="photo-pick" id="pf-photo" role="button" tabindex="0" aria-label="Add profile photo">
      ${p.photo_url?`<img src="${p.photo_url}" alt="Your profile photo"/>`:'Add photo'}
    </div>
    <input type="file" id="pf-file" accept="image/*" style="display:none"/>
    <div id="pf-photo-status" style="text-align:center;font-size:13px;color:var(--gray);min-height:18px;margin-bottom:10px"></div>
    ${t?`<div style="text-align:center;margin-bottom:18px"><span class="type-pill" style="background:${t.color}">${t.emoji} ${t.name}</span></div>`
       :`<p style="text-align:center;font-size:13.5px;margin-bottom:18px"><button class="btn btn-quiet" data-go="quiz" style="padding:0;font-size:13.5px">Take the quiz to add your roommate type ›</button></p>`}
    <div class="lead-field"><label>Name</label><input id="pf-name" value="${(p.name||'').replace(/"/g,'&quot;')}" placeholder="Your name"/></div>
    <div class="lead-field"><label>Age</label><input id="pf-age" type="number" inputmode="numeric" value="${p.age||''}" placeholder="24"/></div>
    <div class="lead-field"><label>Neighborhood / area</label><input id="pf-area" value="${(p.area||'').replace(/"/g,'&quot;')}" placeholder="e.g. Allston"/></div>
    <div class="lead-field"><label>Budget range</label><input id="pf-budget" value="${(p.budget||'').replace(/"/g,'&quot;')}" placeholder="e.g. $900–1,200"/></div>
    <div class="lead-field"><label>Move date</label><input id="pf-move" value="${(p.move_date||'').replace(/"/g,'&quot;')}" placeholder="e.g. Sept 1"/></div>
    <div class="lead-field"><label>Bio</label><input id="pf-bio" value="${(p.bio||'').replace(/"/g,'&quot;')}" placeholder="A line or two about how you live"/></div>
    <div style="margin:26px 0 6px;padding-top:20px;border-top:1px solid var(--hairline)">
      <h3 style="font-size:17px;margin-bottom:14px">Where do you want to live?</h3>
      <div class="lead-field"><label>Target area</label><input id="pf-loc-query" value="${(p.area||'').replace(/"/g,'&quot;')}" placeholder="e.g. Quincy, MA"/></div>
      <button class="btn btn-dark btn-sm" type="button" id="pf-loc-set">Set location</button>
      <div id="pf-loc-status" style="font-size:13px;margin-top:10px;min-height:18px;line-height:1.4"></div>
      <div class="lead-field" style="margin-top:14px"><label>Show me people within</label>
        <select id="pf-radius">${radiusOpts.map(r=>`<option value="${r}"${(p.radius_miles||25)===r?' selected':''}>${r} miles</option>`).join('')}</select>
      </div>
    </div>
    <div style="margin:26px 0 6px;padding-top:20px;border-top:1px solid var(--hairline)">
      <h3 style="font-size:17px;margin-bottom:10px">My place</h3>
      <p class="room-hint">Tip: avoid photos showing your address or street number.</p>
      <div class="room-grid" id="pf-room-grid"></div>
      <div id="pf-room-status" style="text-align:center;font-size:13px;color:var(--gray);min-height:18px;margin-top:10px"></div>
      <input type="file" id="pf-room-file" accept="image/*" style="display:none"/>
    </div>
    <div id="pf-err" style="color:#D93838;font-size:13px;min-height:18px;text-align:center"></div>
    <button class="btn btn-primary btn-lg" id="pf-save" style="width:100%">Save profile</button>
    <div style="text-align:center;margin-top:18px"><button class="btn btn-quiet btn-sm" id="pf-out">Sign out</button></div>
  </div></div>`;
  const photoEl=$g('pf-photo'), fileEl=$g('pf-file'), status=$g('pf-photo-status');
  photoEl.onclick=()=>fileEl.click();
  photoEl.onkeydown=e=>{if(e.key==='Enter'||e.key===' ')fileEl.click()};
  fileEl.onchange=async()=>{
    const f=fileEl.files[0];if(!f)return;
    status.textContent='Uploading…';
    try{
      const blob=await resizeImage(f,512);
      const path=session.user.id+'/avatar.jpg';
      const {error}=await db.storage.from('avatars').upload(path,blob,{upsert:true,contentType:'image/jpeg'});
      if(error)throw error;
      const {data}=db.storage.from('avatars').getPublicUrl(path);
      const url=data.publicUrl+'?v='+Date.now();
      await db.from('profiles').upsert({id:session.user.id,photo_url:url});
      photoEl.innerHTML=`<img src="${url}" alt="Your profile photo"/>`;
      status.textContent='Photo saved ✓';realProfiles=[];
    }catch(ex){status.textContent='Upload failed — try a smaller photo.'}
  };
  const roomGrid=$g('pf-room-grid'), roomFile=$g('pf-room-file'), roomStatus=$g('pf-room-status');
  function renderRoomGrid(){
    const slots=[];
    for(let i=0;i<6;i++){
      const url=pendingRoomPhotos[i];
      slots.push(url
        ? `<div class="room-slot"><img src="${url}" alt="Room photo ${i+1}"/><button class="rm" type="button" data-rm="${i}" aria-label="Remove photo">✕</button></div>`
        : `<button class="room-slot empty" type="button" data-add aria-label="Add room photo">+</button>`);
    }
    roomGrid.innerHTML=slots.join('');
    roomGrid.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>roomFile.click());
    roomGrid.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>removeRoomPhoto(parseInt(b.dataset.rm)));
  }
  async function removeRoomPhoto(idx){
    const url=pendingRoomPhotos[idx];
    if(!url)return;
    pendingRoomPhotos=pendingRoomPhotos.filter((_,i)=>i!==idx);
    renderRoomGrid();
    try{
      const marker='/object/public/rooms/';
      const mi=url.indexOf(marker);
      if(mi!==-1){
        const path=decodeURIComponent(url.slice(mi+marker.length).split('?')[0]);
        await db.storage.from('rooms').remove([path]);
      }
      const {error}=await db.from('profiles').upsert({id:session.user.id,room_photos:pendingRoomPhotos});
      if(error)throw error;
      myProfile.room_photos=pendingRoomPhotos;realProfiles=[];
    }catch(ex){ roomStatus.textContent='Couldn’t remove that photo — try again.'; }
  }
  roomFile.onchange=async()=>{
    const f=roomFile.files[0];if(!f)return;
    if(pendingRoomPhotos.length>=6){roomFile.value='';return}
    roomStatus.textContent='Uploading…';
    try{
      const blob=await resizeImage(f,1200);
      const path=session.user.id+'/'+Date.now()+'.jpg';
      const {error}=await db.storage.from('rooms').upload(path,blob,{upsert:true,contentType:'image/jpeg'});
      if(error)throw error;
      const {data}=db.storage.from('rooms').getPublicUrl(path);
      pendingRoomPhotos=[...pendingRoomPhotos,data.publicUrl];
      const {error:saveErr}=await db.from('profiles').upsert({id:session.user.id,room_photos:pendingRoomPhotos});
      if(saveErr)throw saveErr;
      myProfile.room_photos=pendingRoomPhotos;realProfiles=[];
      renderRoomGrid();
      roomStatus.textContent='Photo added ✓';
    }catch(ex){ roomStatus.textContent='Upload failed — try a smaller photo.'; }
    roomFile.value='';
  };
  renderRoomGrid();
  $g('pf-loc-set').onclick=async()=>{
    const q=$g('pf-loc-query').value.trim();
    const statusEl=$g('pf-loc-status'), btn=$g('pf-loc-set');
    if(!q){statusEl.style.color='#D93838';statusEl.textContent='Type an area first.';return}
    btn.disabled=true;btn.textContent='Searching…';
    statusEl.style.color='var(--gray)';statusEl.textContent='Looking that up…';
    try{
      const result=await geocodeArea(q);
      if(!result){
        statusEl.style.color='#D93838';
        statusEl.textContent='Couldn’t find that — try adding a state, like “Quincy, MA”.';
      }else{
        pendingLat=parseFloat(result.lat);pendingLng=parseFloat(result.lon);
        const short=shortLocationName(result);
        $g('pf-loc-query').value=short;
        const areaEl=$g('pf-area');if(areaEl)areaEl.value=short;
        statusEl.style.color='var(--accent)';
        statusEl.textContent='📍 '+result.display_name;
      }
    }catch(ex){
      statusEl.style.color='#D93838';
      statusEl.textContent='Couldn’t find that — try adding a state, like “Quincy, MA”.';
    }
    btn.disabled=false;btn.textContent='Set location';
  };
  $g('pf-save').onclick=async()=>{
    const btn=$g('pf-save');btn.disabled=true;btn.textContent='Saving…';
    try{
      const {error}=await db.from('profiles').upsert({
        id:session.user.id,
        name:$g('pf-name').value.trim(),
        age:parseInt($g('pf-age').value)||null,
        area:$g('pf-area').value.trim(),
        budget:$g('pf-budget').value.trim(),
        move_date:$g('pf-move').value.trim(),
        bio:$g('pf-bio').value.trim(),
        type:userType||myProfile.type||null,
        lat:pendingLat,
        lng:pendingLng,
        radius_miles:parseInt($g('pf-radius').value)||25
      });
      if(error)throw error;
      btn.textContent='Saved ✓';realProfiles=[];
      setTimeout(()=>{btn.disabled=false;btn.textContent='Save profile'},1200);
    }catch(ex){$g('pf-err').textContent=(ex&&ex.message)||'Save failed — try again.';btn.disabled=false;btn.textContent='Save profile'}
  };
  $g('pf-out').onclick=async()=>{await db.auth.signOut();session=null;realProfiles=[];myProfile=null;myTypeFetchAttempted=false;updateAuthNav();go('home')};
}
function resizeImage(file,max){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const sc=Math.min(1,max/Math.max(img.width,img.height));
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      c.toBlob(b=>b?res(b):rej(new Error('resize failed')),'image/jpeg',.85);
    };
    img.onerror=rej;
    img.src=URL.createObjectURL(file);
  });
}

function go(p){
  if(p==='waitlist'){
    if(page!=='home'){page='home';renderHome()}
    setTimeout(()=>document.getElementById('waitlist').scrollIntoView({behavior:'smooth'}),60);
    updateNav();return;
  }
  if(p==='quiz'&&!hasLead()){showLeadGate();return}
  page=p;window.scrollTo({top:0});
  renderPage();
  updateNav();
}
function renderPage(){
  if(page==='home')renderHome();
  else if(page==='quiz')renderQuiz();
  else if(page==='browse')renderBrowse();
  else if(page==='profile'){ if(!session){showAuthModal('signup');page='home';renderHome();} else renderProfile(); }
  else if(page==='safety')renderSafety();
}
function updateNav(){
  document.querySelector('[data-navquiz]').classList.toggle('active',page==='quiz');
  document.querySelector('[data-navbrowse]').classList.toggle('active',page==='browse');
}
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-go]');
  if(t && document.body.contains(t) && !t.closest('.modal-back'))go(t.dataset.go);
});
document.getElementById('year').textContent=new Date().getFullYear();
renderHome();
</script>
