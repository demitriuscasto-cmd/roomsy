<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="color-scheme" content="light" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Roomsy — Find your people. Share your place.</title>
<meta name="description" content="Roomsy matches roommates by lifestyle, comfort, and trust — not just rent and location. Take the 60-second roommate quiz." />
<meta property="og:title" content="Roomsy — Roommates, matched right." />
<meta property="og:description" content="What kind of roommate are you? Take the 60-second quiz." />

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='15' fill='%233E8E63'/%3E%3Cpolygon points='12,30 32,12 52,30' fill='%23fff'/%3E%3Crect x='17' y='30' width='30' height='22' rx='3' fill='%23fff'/%3E%3Crect x='28' y='38' width='8' height='14' rx='2' fill='%233E8E63'/%3E%3C/svg%3E" />
<style>
:root{--bg:#FFFFFF;--bg-soft:#F5F5F7;--ink:#1D1D1F;--gray:#6E6E73;--hairline:rgba(0,0,0,0.08);--accent:#3E8E63;--accent-hover:#33774F;--dark:#000;--dark-ink:#F5F5F7;--dark-gray:#A1A1A6;--font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;color-scheme:light}
body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;font-size:17px;min-height:100vh}
button{font-family:var(--font);cursor:pointer}
a{color:inherit}
h1,h2,h3{letter-spacing:-.022em;line-height:1.07;font-weight:700}
.wrap{max-width:980px;margin:0 auto;padding:0 max(22px,env(safe-area-inset-left))}
.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--hairline)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:18px;letter-spacing:-.02em;background:none;border:none;color:var(--ink)}
.nav-links{display:flex;gap:2px;align-items:center}
.nav-link{background:none;border:none;font-size:14px;font-weight:500;color:var(--gray);padding:8px 12px;border-radius:99px;transition:color .18s}
.nav-link:hover,.nav-link.active{color:var(--ink)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:999px;font-weight:500;font-size:17px;padding:13px 28px;transition:background .18s,transform .18s,opacity .18s;text-decoration:none}
.btn:active{transform:scale(.97)}
.btn:focus-visible,.nav-link:focus-visible,.opt:focus-visible,input:focus-visible{outline:3px solid rgba(62,142,99,.5);outline-offset:2px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
.btn-quiet{background:transparent;color:var(--accent);font-weight:500;padding:13px 8px}.btn-quiet:hover{text-decoration:underline}
.btn-dark{background:var(--ink);color:#fff}.btn-dark:hover{opacity:.85}
.btn-sm{padding:8px 18px;font-size:14px}.btn-lg{padding:16px 34px;font-size:18px}
.hero{text-align:center;padding:clamp(72px,13vw,130px) 0 clamp(40px,7vw,72px)}
.hero .kicker{font-size:15px;font-weight:600;color:var(--accent);margin-bottom:14px}
.hero h1{font-size:clamp(44px,11vw,84px);font-weight:700;letter-spacing:-.03em;margin-bottom:20px}
.hero .lede{font-size:clamp(19px,4.6vw,25px);color:var(--gray);max-width:25ch;margin:0 auto 30px;line-height:1.35}
.hero-ctas{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}
.hero-note{margin-top:20px;font-size:13px;color:var(--gray)}
.match-moment{display:flex;align-items:center;justify-content:center;gap:clamp(14px,4vw,30px);padding:clamp(28px,6vw,56px) 0 clamp(56px,9vw,96px)}
.person{display:flex;flex-direction:column;align-items:center;gap:10px}
.person .name{font-size:14px;font-weight:600}.person .sub{font-size:12px;color:var(--gray)}
.bubble{width:clamp(76px,19vw,108px);height:clamp(76px,19vw,108px);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:clamp(30px,8vw,44px);font-weight:700;box-shadow:0 12px 34px rgba(0,0,0,.14)}
.ring-wrap{display:flex;flex-direction:column;align-items:center}
@media (prefers-reduced-motion:no-preference){
.ring-progress{transition:stroke-dashoffset 1.6s cubic-bezier(.25,.8,.25,1)}
.rise{animation:rise .8s cubic-bezier(.25,.8,.25,1) both}.rise-2{animation-delay:.12s}.rise-3{animation-delay:.24s}
@keyframes rise{from{opacity:0;transform:translateY(22px)}}}
.section{padding:clamp(64px,11vw,120px) 0}
.section-title{font-size:clamp(32px,7.4vw,56px);letter-spacing:-.028em;text-align:center;margin-bottom:14px}
.section-sub{font-size:clamp(17px,4vw,21px);color:var(--gray);text-align:center;max-width:34ch;margin:0 auto;line-height:1.4}
.dark-band{background:var(--dark);color:var(--dark-ink);border-radius:clamp(0px,4vw,30px);margin:0 auto;max-width:1180px}
.dark-band .section-sub{color:var(--dark-gray)}
.how{max-width:640px;margin:clamp(36px,7vw,64px) auto 0}
.how-row{display:flex;gap:20px;padding:26px 0;border-top:1px solid rgba(255,255,255,.12);align-items:baseline}
.how-row:last-child{border-bottom:1px solid rgba(255,255,255,.12)}
.how-num{font-size:14px;font-weight:600;color:var(--dark-gray);min-width:24px}
.how-row h3{font-size:clamp(19px,4.4vw,24px);margin-bottom:6px}
.how-row p{font-size:15.5px;color:var(--dark-gray);line-height:1.5;max-width:44ch}
.types-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:clamp(32px,6vw,52px)}
.type-tile{background:var(--bg-soft);border:none;border-radius:20px;padding:26px 18px;text-align:center;transition:transform .2s,box-shadow .2s}
.type-tile:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.08)}
.type-tile .emoji{font-size:36px;display:block;margin-bottom:10px}
.type-tile .name{font-size:15px;font-weight:600}
.quiz-shell{max-width:560px;margin:0 auto;padding:clamp(44px,9vw,80px) 22px 90px}
.quiz-count{font-size:13px;color:var(--gray);font-weight:600;text-align:center;margin-bottom:12px}
.quiz-progress{height:4px;background:var(--bg-soft);border-radius:99px;overflow:hidden;margin-bottom:clamp(30px,6vw,44px)}
.quiz-progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .35s cubic-bezier(.25,.8,.25,1)}
.quiz-q{font-size:clamp(26px,6.6vw,36px);letter-spacing:-.025em;text-align:center;margin-bottom:clamp(26px,5vw,38px)}
.opt{display:block;width:100%;text-align:center;background:var(--bg-soft);border:2px solid transparent;border-radius:16px;padding:17px 20px;font-size:16.5px;font-weight:500;color:var(--ink);margin-bottom:10px;transition:border-color .15s,background .15s,transform .15s}
.opt:hover{border-color:var(--accent);background:#fff}.opt:active{transform:scale(.98)}
.result-card{border-radius:28px;overflow:hidden;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.16)}
.result-top{padding:clamp(48px,10vw,64px) 28px clamp(36px,7vw,48px);color:#fff}
.result-top .emoji{font-size:clamp(56px,14vw,76px);display:block;margin-bottom:12px}
.result-top .you-are{font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;opacity:.8;margin-bottom:8px}
.result-top h2{font-size:clamp(32px,8vw,44px);letter-spacing:-.025em}
.result-body{padding:28px 26px 30px;background:#fff}
.result-body p{color:var(--gray);font-size:16.5px;max-width:36ch;margin:0 auto 18px;line-height:1.5}
.result-brand{font-weight:700;color:var(--ink);font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px}
.result-ctas{display:flex;flex-direction:column;gap:10px;align-items:stretch;margin-top:26px}
@media (min-width:560px){.result-ctas{flex-direction:row;justify-content:center}}
.browse-hero{text-align:center;padding:clamp(48px,9vw,80px) 0 28px}
.browse-hero h1{font-size:clamp(34px,8vw,56px);letter-spacing:-.028em;margin-bottom:12px}
.browse-hero p{color:var(--gray);font-size:17px;max-width:40ch;margin:0 auto}
.filters{display:flex;gap:8px;overflow-x:auto;padding:22px 0 6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter{flex-shrink:0;background:var(--bg-soft);border:none;border-radius:999px;padding:9px 18px;font-size:14px;font-weight:500;color:var(--ink);transition:background .15s,color .15s}
.filter.active{background:var(--ink);color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));gap:16px;padding:18px 0 80px}
.card{background:var(--bg-soft);border-radius:24px;padding:26px;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.09)}
.card-top{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:22px;flex-shrink:0}
.avatar.lg{width:76px;height:76px;font-size:30px}
.card h3{font-size:19px}.card .meta{font-size:13.5px;color:var(--gray);margin-top:2px}
.card .bio{font-size:15px;color:#48484A;margin-bottom:16px;line-height:1.45}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.tag{font-size:12px;font-weight:500;background:#fff;color:var(--gray);border-radius:999px;padding:5px 12px}
.type-pill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;border-radius:999px;padding:5px 13px;color:#fff;margin-bottom:14px}
.compat{display:flex;align-items:center;gap:10px}
.compat .pct{font-weight:700;font-size:22px;letter-spacing:-.02em;color:var(--accent)}
.compat .label{font-size:13px;color:var(--gray)}
.compat.locked .pct{font-size:14px;color:var(--gray);font-weight:500}
.waitlist{background:var(--bg-soft);border-radius:clamp(20px,4vw,30px);padding:clamp(52px,10vw,90px) 26px;text-align:center;margin-bottom:clamp(56px,9vw,90px)}
.waitlist h2{font-size:clamp(30px,7vw,50px);letter-spacing:-.028em;margin-bottom:12px}
.waitlist p{color:var(--gray);max-width:40ch;margin:0 auto 30px;font-size:17px}
.waitlist-form{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.waitlist-form input{border:1px solid var(--hairline);background:#fff;border-radius:999px;padding:15px 24px;font-size:16.5px;font-family:var(--font);width:min(340px,100%);color:var(--ink)}
.waitlist .fine{margin:18px 0 0;font-size:12.5px;color:var(--gray)}
.success{background:#fff;border-radius:16px;padding:16px 26px;display:inline-block;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.06)}
.demo-banner{background:var(--bg-soft);color:var(--gray);font-size:13.5px;border-radius:14px;padding:12px 16px;text-align:center;margin-top:18px;line-height:1.5}
.demo-banner button{background:none;border:none;color:var(--accent);font-weight:600;font-size:13.5px;text-decoration:underline}
.footer{border-top:1px solid var(--hairline);padding:26px 0 44px;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:12.5px;color:var(--gray)}
.footer .links{display:flex;gap:18px}
.footer button,.footer a{background:none;border:none;color:var(--gray);font-size:12.5px;text-decoration:none}
.footer button:hover,.footer a:hover{color:var(--ink)}
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:26px 26px 0 0;padding:30px 26px calc(30px + env(safe-area-inset-bottom));max-width:520px;width:100%;max-height:88vh;overflow-y:auto}
@media (min-width:640px){.modal-back{align-items:center;padding:20px}.modal{border-radius:26px}}
.modal h2{font-size:25px}.modal .close{float:right;background:var(--bg-soft);border:none;width:32px;height:32px;border-radius:50%;font-size:17px;color:var(--gray);line-height:1}
.safety-row{padding:24px 0;border-top:1px solid var(--hairline)}
.safety-row:last-of-type{border-bottom:1px solid var(--hairline)}
.safety-row h3{font-size:19px;margin-bottom:6px}
.safety-row p{font-size:15.5px;color:var(--gray);line-height:1.5}
.hidden{display:none!important}
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap nav-inner">
    <button class="logo" data-go="home">
      <svg width="22" height="22" viewBox="0 0 64 64" aria-hidden="true"><rect width="64" height="64" rx="15" fill="#3E8E63"/><polygon points="12,30 32,12 52,30" fill="#fff"/><rect x="17" y="30" width="30" height="22" rx="3" fill="#fff"/><rect x="28" y="38" width="8" height="14" rx="2" fill="#3E8E63"/></svg>
      Roomsy
    </button>
    <div class="nav-links">
      <button class="nav-link" data-go="quiz" data-navquiz>Quiz</button>
      <button class="nav-link" data-go="browse" data-navbrowse>Browse</button>
      <button class="btn btn-primary btn-sm" data-go="waitlist">Early access</button>
    </div>
  </div>
</nav>

<main id="view"></main>

<div class="wrap">
  <footer class="footer">
    <span>© <span id="year"></span> Roomsy</span>
    <div class="links">
      <button data-go="safety">Safety</button>
      <button data-go="quiz">Quiz</button>
      <a href="mailto:hello@roomsy.app">Contact</a>
    </div>
  </footer>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   ROOMSY CONFIG — the only lines you edit to go live.

   WAITLIST_ENDPOINT: make a free form at https://formspree.io
   and paste its endpoint below (looks like
   'https://formspree.io/f/xxxxxxx'). Every signup then
   emails you. While empty, signups save in the visitor's
   browser only (demo mode).
   ═══════════════════════════════════════════════════════ */
const WAITLIST_ENDPOINT = '';

/* ── Data ─────────────────────────────────────────────── */
const TYPES = {
  earlybird:{key:'earlybird',name:'The Early Bird',emoji:'🌅',color:'#E8A13A',blurb:'Up with the sun, coffee brewed by 7. You keep the household on schedule and love a quiet morning.'},
  nightowl:{key:'nightowl',name:'The Night Owl',emoji:'🦉',color:'#4A5A8F',blurb:'You come alive after dark. Late-night snacks, headphones on, deep respect for anyone who sleeps early.'},
  host:{key:'host',name:'The Social Host',emoji:'🎉',color:'#E8705A',blurb:'Your place is the gathering spot. Group dinners, movie nights, always room for one more friend.'},
  homebody:{key:'homebody',name:'The Quiet Homebody',emoji:'🌿',color:'#5A8F6F',blurb:'Home is your recharge zone. Cozy, calm, considerate — the roommate everyone hopes for.'},
  keeper:{key:'keeper',name:'The Order Keeper',emoji:'✨',color:'#3A8F8A',blurb:'Labeled shelves, a chore chart that actually works, and dishes never sleep in the sink.'},
  spirit:{key:'spirit',name:'The Free Spirit',emoji:'🪁',color:'#B45AA0',blurb:'Flexible, easygoing, spontaneous. Plans change, vibes stay good. You adapt to almost any household.'}
};
const QUIZ = [
  {q:'Your alarm goes off at 6:30am. You…',a:[['Already up — beat it by ten minutes','earlybird'],['Snooze once, then go','keeper'],['Snooze until the last possible second','nightowl'],['Alarm? I wake up when I wake up','spirit']]},
  {q:"It's Friday night. Your ideal evening at home:",a:[['Friends over, music on, cooking together','host'],['Blanket, tea, and a show','homebody'],['Deep-cleaning the kitchen, honestly','keeper'],['Gaming or a project until 3am','nightowl']]},
  {q:'A dish has been in the sink for two days. You…',a:[['Washed it on day one — mine or not','keeper'],['Leave a friendly note','earlybird'],["Mention it next time we're both home",'homebody'],["Honestly didn't notice",'spirit']]},
  {q:'How do you feel about surprise guests?',a:[['Love it — more the merrier','host'],['Fine with a heads-up text','homebody'],['Weekends only please','keeper'],['Depends entirely on my mood','nightowl']]},
  {q:'Your grocery strategy:',a:[['Sunday meal prep, labeled containers','keeper'],['Farmers market run in the morning','earlybird'],['Group dinners — we split the cost','host'],['Whatever the corner store has at 11pm','nightowl']]},
  {q:'Shared living room decor should be…',a:[['Plants. So many plants','homebody'],['Minimal and tidy','keeper'],['Set up for hosting — big couch, good speakers','host'],['Eclectic — bring whatever, it\u2019ll work','spirit']]},
  {q:'Noise tolerance on a weeknight:',a:[['Quiet by 10, please','earlybird'],['Headphones exist for a reason — do your thing','nightowl'],['Reasonable is fine, parties on weekends','host'],['I barely notice noise','spirit']]},
  {q:'The thermostat wars. Your stance:',a:[['There is one correct temperature and a schedule','keeper'],['Warm and cozy always','homebody'],['Windows open, fresh air','earlybird'],["I'll adapt to whatever",'spirit']]},
  {q:'A roommate is having a rough week. You…',a:[['Cook them dinner and invite friends over','host'],['Give them space, check in gently','homebody'],['Quietly handle their chores this week','keeper'],['Late-night talk on the fire escape','nightowl']]},
  {q:'Your lease ends in 3 months. You…',a:[['Already have a spreadsheet of options','keeper'],['Started saving and set alerts','earlybird'],["It'll work out — it always does",'spirit'],['Asking the group chat where everyone\u2019s going','host']]}
];
const AFFINITY = {
  earlybird:{earlybird:92,keeper:88,homebody:84,host:62,spirit:70,nightowl:48},
  nightowl:{nightowl:90,spirit:84,host:76,homebody:68,keeper:55,earlybird:48},
  host:{host:88,spirit:86,nightowl:76,earlybird:62,keeper:58,homebody:52},
  homebody:{homebody:94,earlybird:84,keeper:82,nightowl:68,spirit:64,host:52},
  keeper:{keeper:90,earlybird:88,homebody:82,host:58,nightowl:55,spirit:50},
  spirit:{spirit:88,host:86,nightowl:84,earlybird:70,homebody:64,keeper:50}
};
const compat = (u,o)=> u ? (AFFINITY[u]&&AFFINITY[u][o])||65 : null;
const PROFILES = [
  {id:1,name:'Maya',age:24,area:'Allston',type:'homebody',budget:'$900–1,100',move:'Sept 1',bio:'Grad student, plant parent, weekend baker. Looking for a calm 2BR.',tags:['No smoking','Cat friendly','Early sleeper']},
  {id:2,name:'Jordan',age:27,area:'Dorchester',type:'keeper',budget:'$1,000–1,300',move:'Aug 15',bio:'Nurse on day shifts. I keep things tidy and expect the same. Sunday meal prepper.',tags:['Very clean','Quiet weekdays','Gym rat']},
  {id:3,name:'Sam',age:23,area:'Brighton',type:'host',budget:'$800–1,000',move:'Sept 1',bio:'Marketing coordinator. I host a monthly dinner party — you\u2019re invited.',tags:['Social','Foodie','Dog friendly']},
  {id:4,name:'Priya',age:26,area:'Cambridge',type:'earlybird',budget:'$1,200–1,500',move:'Flexible',bio:'Biotech researcher, 6am runner. In bed by 10, up with the sun.',tags:['Early riser','Runner','No parties']},
  {id:5,name:'Deshawn',age:25,area:'Quincy',type:'nightowl',budget:'$900–1,200',move:'Oct 1',bio:'Software dev, remote. Quiet during the day, creative at night. Headphones always.',tags:['Remote worker','Gamer','Considerate']},
  {id:6,name:'Alex',age:28,area:'Somerville',type:'spirit',budget:'$1,000–1,400',move:'Sept 1',bio:'Travel photographer, gone half the month. Easygoing about basically everything.',tags:['Often traveling','Flexible','Artist']},
  {id:7,name:'Grace',age:24,area:'Jamaica Plain',type:'homebody',budget:'$850–1,050',move:'Aug 20',bio:'Teacher. Quiet nights, loud laughter, strong tea opinions.',tags:['LGBTQ+ friendly','Book club','No smoking']},
  {id:8,name:'Marcus',age:29,area:'Medford',type:'keeper',budget:'$1,100–1,400',move:'Sept 15',bio:'Navy vet, now in project management. Structured, respectful, drama-free.',tags:['Veteran','Very clean','Early riser']}
];
const GRAD = {1:['#5A8F6F','#8FBF9F'],2:['#3A8F8A','#6FC4BF'],3:['#E8705A','#F2A48F'],4:['#E8A13A','#F2C878'],5:['#4A5A8F','#8593C4'],6:['#B45AA0','#D693C9'],7:['#5A8F6F','#A8C6B2'],8:['#1B2A3B','#4A6076']};

/* ── State ────────────────────────────────────────────── */
let page='home', qi=0, scores={}, result=null, filter='all';
let userType=null; try{userType=localStorage.getItem('roomsy_type')||null}catch(e){}

/* ── Helpers ──────────────────────────────────────────── */
const view=document.getElementById('view');
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;');
const logoSvg=s=>`<svg width="${s}" height="${s}" viewBox="0 0 64 64" aria-hidden="true"><rect width="64" height="64" rx="15" fill="#3E8E63"/><polygon points="12,30 32,12 52,30" fill="#fff"/><rect x="17" y="30" width="30" height="22" rx="3" fill="#fff"/><rect x="28" y="38" width="8" height="14" rx="2" fill="#3E8E63"/></svg>`;
const avatar=(p,lg)=>`<div class="avatar${lg?' lg':''}" style="background:linear-gradient(135deg,${GRAD[p.id][0]},${GRAD[p.id][1]})">${p.name[0]}</div>`;
const pill=k=>{const t=TYPES[k];return `<span class="type-pill" style="background:${t.color}">${t.emoji} ${t.name}</span>`};
function ring(pct,size,dark){
  const r=(size-14)/2, c=2*Math.PI*r;
  return `<svg width="${size}" height="${size}" role="img" aria-label="${pct} percent compatible">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${dark?'rgba(255,255,255,.15)':'#E8E8ED'}" stroke-width="10"/>
    <circle class="ring-progress" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#3E8E63" stroke-width="10" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c}" data-target="${c*(1-pct/100)}" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="49%" text-anchor="middle" font-weight="700" font-size="${size*.23}" fill="${dark?'#fff':'#1D1D1F'}">${pct}%</text>
    <text x="50%" y="65%" text-anchor="middle" font-size="${size*.095}" font-weight="500" fill="#6E6E73">match</text>
  </svg>`;
}
function animateRings(){requestAnimationFrame(()=>requestAnimationFrame(()=>{
  document.querySelectorAll('.ring-progress').forEach(el=>{el.style.strokeDashoffset=el.dataset.target});
}))}
const waitlistFormHtml=()=>`
  <div class="waitlist-form" id="wl-form">
    <input type="email" id="wl-email" placeholder="Email address" aria-label="Email address"/>
    <button class="btn btn-dark" id="wl-btn">Join waitlist</button>
  </div>`;

/* ── Pages ────────────────────────────────────────────── */
function renderHome(){
  view.innerHTML=`
  <div class="wrap">
    <section class="hero">
      <div class="kicker rise">Roomsy</div>
      <h1 class="rise">Roommates,<br/>matched right.</h1>
      <p class="lede rise rise-2">Lifestyle first. Rent second. Strangers never.</p>
      <div class="hero-ctas rise rise-3">
        <button class="btn btn-primary btn-lg" data-go="quiz">Take the quiz</button>
        <button class="btn btn-quiet btn-lg" data-go="browse">See matching&nbsp;›</button>
      </div>
      <p class="hero-note rise rise-3">60 seconds · Free · No signup</p>
    </section>
    <div class="match-moment" aria-hidden="true">
      <div class="person rise"><div class="bubble" style="background:linear-gradient(135deg,#5A8F6F,#A8C6B2)">M</div><span class="name">Maya</span><span class="sub">Quiet Homebody</span></div>
      <div class="ring-wrap rise rise-2">${ring(91,130)}</div>
      <div class="person rise rise-3"><div class="bubble" style="background:linear-gradient(135deg,#E8A13A,#F2C878)">P</div><span class="name">Priya</span><span class="sub">Early Bird</span></div>
    </div>
  </div>
  <section class="dark-band"><div class="wrap section">
    <h2 class="section-title">Compatibility<br/>before contact.</h2>
    <p class="section-sub">You see how well your lifestyles fit before anyone can say hello.</p>
    <div class="how">
      <div class="how-row"><span class="how-num">1</span><div><h3>Take the quiz</h3><p>Ten questions about how you actually live — mornings, mess, guests, noise. You get one of six roommate types.</p></div></div>
      <div class="how-row"><span class="how-num">2</span><div><h3>See your matches</h3><p>Every profile shows a lifestyle match score, so you know who fits before you reach out.</p></div></div>
      <div class="how-row"><span class="how-num">3</span><div><h3>Match. Verify. Chat.</h3><p>Messaging opens only after a mutual match and ID verification. No cold DMs, no address sharing.</p></div></div>
    </div>
  </div></section>
  <div class="wrap">
    <section class="section">
      <h2 class="section-title">Six types.<br/>One is you.</h2>
      <div class="types-grid">
        ${Object.values(TYPES).map(t=>`<button class="type-tile" data-go="quiz"><span class="emoji">${t.emoji}</span><span class="name">${t.name}</span></button>`).join('')}
      </div>
      <div style="text-align:center;margin-top:36px"><button class="btn btn-primary btn-lg" data-go="quiz">Find out my type</button></div>
    </section>
    <section class="waitlist" id="waitlist">
      <h2>The app is coming.</h2>
      <p>Take the quiz today. Full matching arrives with the app — waitlist members get in first.</p>
      ${waitlistFormHtml()}
      <p class="fine">One email at launch. Unsubscribe anytime.</p>
    </section>
  </div>`;
  animateRings(); bindWaitlist();
}

function renderQuiz(){
  if(result){
    const t=TYPES[result];
    view.innerHTML=`
    <div class="quiz-shell">
      <div class="result-card">
        <div class="result-top" style="background:linear-gradient(160deg,${t.color},${t.color}B8)">
          <span class="emoji">${t.emoji}</span>
          <div class="you-are">Your roommate type</div>
          <h2>${t.name}</h2>
        </div>
        <div class="result-body">
          <p>${t.blurb}</p>
          <div class="result-brand">${logoSvg(17)} Roomsy</div>
        </div>
      </div>
      <div class="result-ctas">
        <button class="btn btn-primary" id="share-btn">Share my type</button>
        <button class="btn btn-dark" data-go="browse">See my matches</button>
        <button class="btn btn-quiet" id="retake-btn">Retake</button>
      </div>
    </div>`;
    document.getElementById('share-btn').onclick=shareResult;
    document.getElementById('retake-btn').onclick=()=>{result=null;scores={};qi=0;renderQuiz()};
    return;
  }
  const q=QUIZ[qi];
  view.innerHTML=`
  <div class="quiz-shell">
    <div class="quiz-count">${qi+1} of ${QUIZ.length}</div>
    <div class="quiz-progress"><div class="quiz-progress-fill" style="width:${(qi/QUIZ.length)*100}%"></div></div>
    <h1 class="quiz-q">${esc(q.q)}</h1>
    ${q.a.map(([label,key],idx)=>`<button class="opt" data-answer="${key}">${esc(label)}</button>`).join('')}
  </div>`;
  view.querySelectorAll('[data-answer]').forEach(b=>b.onclick=()=>{
    const k=b.dataset.answer;
    scores[k]=(scores[k]||0)+1;
    if(qi+1<QUIZ.length){qi++;renderQuiz();window.scrollTo({top:0})}
    else{
      result=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
      userType=result;
      try{localStorage.setItem('roomsy_type',result)}catch(e){}
      renderQuiz();window.scrollTo({top:0});
    }
  });
}

async function shareResult(){
  const t=TYPES[result];
  const text=`I'm ${t.name} ${t.emoji} — what kind of roommate are you? Take the Roomsy quiz:`;
  const url=window.location.href.split('#')[0];
  if(navigator.share){try{await navigator.share({title:'My Roomsy type',text,url});return}catch(e){}}
  try{await navigator.clipboard.writeText(text+' '+url);alert('Copied — paste it anywhere.')}
  catch(e){alert(text+' '+url)}
}

function renderBrowse(){
  let list=PROFILES.map(p=>({...p,score:compat(userType,p.type)}));
  if(filter!=='all')list=list.filter(p=>p.type===filter);
  if(userType)list.sort((a,b)=>b.score-a.score);
  view.innerHTML=`
  <div class="wrap">
    <div class="browse-hero">
      <h1>Browse roommates</h1>
      ${userType
        ?`<p>Sorted by fit with <strong>${TYPES[userType].emoji} ${TYPES[userType].name}</strong></p>`
        :`<p>Take the quiz to unlock your match scores. <button class="btn btn-quiet" style="padding:0;font-size:17px" data-go="quiz">Take it now ›</button></p>`}
    </div>
    <div class="filters">
      <button class="filter${filter==='all'?' active':''}" data-filter="all">All</button>
      ${Object.values(TYPES).map(t=>`<button class="filter${filter===t.key?' active':''}" data-filter="${t.key}">${t.emoji} ${t.name}</button>`).join('')}
    </div>
    <div class="grid">
      ${list.map(p=>`
      <div class="card">
        <div class="card-top">${avatar(p)}<div><h3>${p.name}, ${p.age}</h3><div class="meta">${p.area} · Moves ${p.move}</div></div></div>
        ${pill(p.type)}
        <p class="bio">${esc(p.bio)}</p>
        <div class="tag-row">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <div class="compat${p.score==null?' locked':''}">
          ${p.score!=null?`<span class="pct">${p.score}%</span><span class="label">lifestyle match</span>`:`<span class="pct">Take the quiz to see your match</span>`}
          <button class="btn btn-sm" style="margin-left:auto;background:#fff;color:var(--ink)" data-open="${p.id}">View</button>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
  view.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{filter=b.dataset.filter;renderBrowse()});
  view.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>openModal(+b.dataset.open));
}

function openModal(id){
  const p=PROFILES.find(x=>x.id===id);
  const score=compat(userType,p.type);
  const back=document.createElement('div');
  back.className='modal-back';
  back.innerHTML=`
  <div class="modal">
    <button class="close" aria-label="Close">✕</button>
    <div class="card-top" style="margin-bottom:16px">${avatar(p,true)}<div><h2>${p.name}, ${p.age}</h2><div class="meta">${p.area} · ${p.budget} · Moves ${p.move}</div></div></div>
    ${pill(p.type)}
    <p style="color:var(--gray);margin:14px 0 16px;line-height:1.5">${esc(p.bio)}</p>
    <div class="tag-row">${p.tags.map(t=>`<span class="tag" style="background:var(--bg-soft)">${t}</span>`).join('')}</div>
    ${score!=null?`<div style="display:flex;justify-content:center;margin:20px 0 4px">${ring(score,116)}</div>`:''}
    <div class="demo-banner">Demo profile. Matching and secure messaging arrive with the app — <button data-go="waitlist">join the waitlist</button>.</div>
  </div>`;
  back.onclick=e=>{if(e.target===back)back.remove()};
  back.querySelector('.close').onclick=()=>back.remove();
  back.querySelector('[data-go]').onclick=()=>{back.remove();go('waitlist')};
  document.body.appendChild(back);
  animateRings();
}

function renderSafety(){
  const rows=[
    ['ID verification before messaging','Every member verifies a government ID and selfie before they can chat. No verification, no messages.'],
    ['Mutual match required',"Nobody can message you unless you've both said yes. No cold DMs, ever."],
    ['Addresses stay private','Only neighborhoods are shown — exact locations are never shared automatically.'],
    ['Report and block anywhere','One tap from any profile or conversation. Reports reviewed within 24 hours.']
  ];
  view.innerHTML=`
  <div class="quiz-shell" style="padding-bottom:70px">
    <h1 style="font-size:clamp(32px,8vw,48px);letter-spacing:-.028em;text-align:center;margin-bottom:14px">Safety first.<br/>Always.</h1>
    <p style="color:var(--gray);text-align:center;margin-bottom:36px">What ships with the app:</p>
    ${rows.map(([h,p])=>`<div class="safety-row"><h3>${h}</h3><p>${p}</p></div>`).join('')}
    <p style="color:var(--gray);font-size:13.5px;margin-top:26px;text-align:center;line-height:1.55">Wherever you meet a potential roommate: meet in public first, video call before viewings, and never send money before signing a lease you've read.</p>
  </div>`;
}

/* ── Waitlist ─────────────────────────────────────────── */
function bindWaitlist(){
  const btn=document.getElementById('wl-btn');
  const input=document.getElementById('wl-email');
  if(!btn)return;
  const submit=async()=>{
    const email=input.value.trim();
    if(!/.+@.+\..+/.test(email)){input.style.borderColor='#D93838';return}
    btn.textContent='Joining…';btn.disabled=true;
    try{
      if(WAITLIST_ENDPOINT){
        await fetch(WAITLIST_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({email,source:'roomsy-web'})});
      }else{
        const l=JSON.parse(localStorage.getItem('roomsy_waitlist')||'[]');
        l.push({email,at:new Date().toISOString()});
        localStorage.setItem('roomsy_waitlist',JSON.stringify(l));
      }
    }catch(e){}
    document.getElementById('wl-form').outerHTML='<div class="success">You\u2019re on the list. See you at launch. 🎉</div>';
  };
  btn.onclick=submit;
  input.onkeydown=e=>{if(e.key==='Enter')submit()};
  input.oninput=()=>{input.style.borderColor=''};
}

/* ── Router ───────────────────────────────────────────── */
function go(p){
  if(p==='waitlist'){
    if(page!=='home'){page='home';renderHome()}
    setTimeout(()=>document.getElementById('waitlist').scrollIntoView({behavior:'smooth'}),60);
    updateNav();return;
  }
  page=p;window.scrollTo({top:0});
  if(p==='home')renderHome();
  else if(p==='quiz')renderQuiz();
  else if(p==='browse')renderBrowse();
  else if(p==='safety')renderSafety();
  updateNav();
}
function updateNav(){
  document.querySelector('[data-navquiz]').classList.toggle('active',page==='quiz');
  document.querySelector('[data-navbrowse]').classList.toggle('active',page==='browse');
}
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-go]');
  if(t && document.body.contains(t) && !t.closest('.modal-back'))go(t.dataset.go);
});
document.getElementById('year').textContent=new Date().getFullYear();
renderHome();
</script>
</body>
